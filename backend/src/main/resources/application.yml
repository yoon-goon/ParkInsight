spring:
  application:
    name: parkinsight
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/parkinsight?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars!!}
    expiration: 86400000

gemini:
  api-key: ${GEMINI_API_KEY:}
  chat-model: gemini-3.1-flash-lite
  embedding-model: gemini-embedding-001

weather:
  api-key: ${WEATHER_API_KEY:}
  base-url: https://api.openweathermap.org/data/2.5
  lat: 37.5665
  lon: 126.9780

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

qdrant:
  host: ${QDRANT_HOST:7d22593e-a17c-4227-89c7-380cd9b106e2.us-west-1-0.aws.cloud.qdrant.io}
  port: ${QDRANT_PORT:6334}
  api-key: ${QDRANT_API_KEY:}
  tls: ${QDRANT_TLS:true}
  collection-name: parkinsight-docs
  dimension: 3072
